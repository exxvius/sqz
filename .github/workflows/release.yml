name: release

# Build portable, self-contained sqz packages (with bundled FFmpeg) for
# Windows, macOS, and Linux, and attach them to a GitHub Release.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            triple: x86_64-pc-windows-msvc
          - os: macos-latest
            triple: aarch64-apple-darwin
          - os: ubuntu-22.04
            triple: x86_64-unknown-linux-gnu

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev \
            librsvg2-dev patchelf libssl-dev

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.triple }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install web dependencies
        run: npm ci

      - name: Generate app icons
        run: npm run tauri icon src-tauri/icons/sqz.svg

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --target ${{ matrix.triple }}
          tagName: ${{ github.ref_name }}
          releaseName: "sqz ${{ github.ref_name }}"
          releaseBody: "Tiny sqz installers. FFmpeg is downloaded on first run (or bring your own). See NOTICE for licensing."
          releaseDraft: true
          prerelease: false
